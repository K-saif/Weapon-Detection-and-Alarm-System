<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts History - Weapon Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-content h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header-content p {
            font-size: 14px;
            opacity: 0.9;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .controls {
            background: #1a1f3a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
        }

        select, input[type="text"] {
            padding: 10px 12px;
            font-size: 13px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #252d47;
            color: #fff;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            background: #2a3454;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.2);
        }

        button {
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1a1f3a;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #10b981;
        }

        .stat-card.alerts .stat-value {
            color: #ef4444;
        }

        .alerts-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .alert-card {
            background: #1a1f3a;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #252d47;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .alert-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(239, 68, 68, 0.2);
            border-color: #667eea;
        }

        .alert-thumbnail {
            width: 100%;
            height: 200px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }

        .alert-thumbnail:hover {
            transform: scale(1.05);
        }

        .alert-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.3s;
        }

        .alert-thumbnail:hover img {
            filter: brightness(1.1);
        }

        .alert-thumbnail.no-image {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 14px;
            cursor: not-allowed;
        }

        /* Lightbox Modal Styles */
        .lightbox-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .lightbox-modal.active {
            display: flex;
        }

        .lightbox-content {
            position: relative;
            width: 90%;
            height: 90%;
            max-width: 1000px;
            max-height: 800px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(102, 126, 234, 0.3);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10001;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 10001;
        }

        .lightbox-nav button {
            pointer-events: all;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lightbox-nav button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .lightbox-nav button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .lightbox-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #e0e0e0;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            z-index: 10001;
        }

        .lightbox-info-title {
            font-weight: 700;
            margin-bottom: 8px;
            color: #ef4444;
        }

        .lightbox-info-item {
            font-size: 12px;
            margin: 4px 0;
        }

        .preview-indicator {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(102, 126, 234, 0.8);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
        }

        .alert-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .alert-content {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .alert-title {
            font-size: 14px;
            font-weight: 700;
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .alert-time {
            font-size: 11px;
            color: #999;
        }

        .alert-details {
            font-size: 12px;
            color: #ccc;
            line-height: 1.6;
            flex: 1;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #252d47;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #999;
            font-weight: 600;
            min-width: 100px;
        }

        .detail-value {
            color: #e0e0e0;
            font-weight: 500;
            text-align: right;
            flex: 1;
        }

        .alert-actions {
            padding: 10px;
            margin-top: 10px;
            border-top: 1px solid #252d47;
            display: flex;
            gap: 8px;
        }

        .btn-small {
            flex: 1;
            padding: 8px;
            font-size: 11px;
            border: 1px solid #444;
            background: #252d47;
            color: #ccc;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn-small:hover {
            background: #2a3454;
            border-color: #667eea;
            color: #fff;
        }

        .no-alerts {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            background: #1a1f3a;
            border-radius: 10px;
        }

        .no-alerts-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .no-alerts-text {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .no-alerts-subtext {
            font-size: 13px;
            color: #555;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #252d47;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .alerts-container {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }

            .controls {
                flex-direction: column;
            }

            .control-group {
                flex-direction: column;
                align-items: flex-start;
            }

            select, input[type="text"] {
                width: 100%;
            }

            .stat-card {
                min-width: 100%;
            }

            .lightbox-content {
                width: 95%;
                height: 85%;
            }

            .lightbox-nav {
                padding: 0 10px;
            }

            .lightbox-nav button {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .lightbox-close {
                width: 40px;
                height: 40px;
                font-size: 24px;
            }

            .lightbox-info {
                font-size: 11px;
                padding: 10px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>🚨 Alerts History</h1>
            <p>View and manage weapon detection alerts</p>
        </div>
        <a href="/" class="back-btn">← Back to Dashboard</a>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Sort By:</label>
            <select id="sort-select" onchange="applyFilters()">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="confidence">Highest Confidence</option>
            </select>
        </div>
        <div class="control-group">
            <label>Filter:</label>
            <select id="filter-select" onchange="applyFilters()">
                <option value="all">All Alerts</option>
                <option value="high">High Confidence (>90%)</option>
                <option value="medium">Medium Confidence (70-90%)</option>
            </select>
        </div>
        <button class="btn-primary" onclick="refreshAlerts()">🔄 Refresh</button>
        <button class="btn-danger" id="clear-btn" onclick="clearAllAlerts()" disabled>🗑️ Clear All</button>
    </div>

    <div class="stats-bar">
        <div class="stat-card alerts">
            <div class="stat-label">Total Alerts</div>
            <div class="stat-value" id="total-alerts">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Average Confidence</div>
            <div class="stat-value" id="avg-confidence">0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Unique Detections</div>
            <div class="stat-value" id="unique-detections">0</div>
        </div>
    </div>

    <div class="alerts-container" id="alerts-container">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading alerts...</p>
        </div>
    </div>

    <!-- Lightbox Modal for Image Preview -->
    <div class="lightbox-modal" id="lightbox-modal">
        <div class="lightbox-content">
            <button class="lightbox-close" onclick="closeLightbox()">✕</button>
            <div class="lightbox-nav">
                <button onclick="prevImage()" id="prev-btn">❮</button>
                <button onclick="nextImage()" id="next-btn">❯</button>
            </div>
            <img id="lightbox-image" class="lightbox-image" alt="Alert preview">
            <div class="lightbox-info">
                <div class="lightbox-info-title">Alert Details</div>
                <div class="lightbox-info-item">Confidence: <strong id="lightbox-confidence">0%</strong></div>
                <div class="lightbox-info-item">Track ID: <strong id="lightbox-track-id">#0</strong></div>
                <div class="lightbox-info-item">Frame: <strong id="lightbox-frame">0</strong></div>
                <div class="lightbox-info-item">Image: <strong id="lightbox-counter">0/0</strong></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>Weapon Detection System | Alerts Management Module</p>
    </div>

    <script>
        const API_BASE = "http://localhost:5000/api";
        let allAlerts = [];
        let currentLightboxAlerts = [];
        let currentImageIndex = 0;

        // Load alerts on page load
        window.addEventListener('load', () => {
            refreshAlerts();
            // Refresh every 5 seconds
            setInterval(refreshAlerts, 5000);
            // Add keyboard event listeners
            document.addEventListener('keydown', handleKeyboard);
        });

        function handleKeyboard(e) {
            const modal = document.getElementById('lightbox-modal');
            if (!modal.classList.contains('active')) return;
            
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
        }

        async function refreshAlerts() {
            try {
                const response = await fetch(`${API_BASE}/alerts`);
                if (response.ok) {
                    allAlerts = await response.json();
                    updateStats();
                    applyFilters();
                    
                    // Enable/disable clear button based on whether there are alerts
                    const clearBtn = document.getElementById('clear-btn');
                    clearBtn.disabled = allAlerts.length === 0;
                }
            } catch (error) {
                console.error("Error loading alerts:", error);
                showError("Failed to load alerts");
            }
        }

        function updateStats() {
            const totalAlerts = allAlerts.length;
            document.getElementById('total-alerts').textContent = totalAlerts;

            if (totalAlerts === 0) {
                document.getElementById('avg-confidence').textContent = '0%';
                document.getElementById('unique-detections').textContent = '0';
                return;
            }

            const totalConfidence = allAlerts.reduce((sum, alert) => sum + (alert.confidence || 0), 0);
            const avgConfidence = ((totalConfidence / totalAlerts) * 100).toFixed(1);
            document.getElementById('avg-confidence').textContent = avgConfidence + '%';

            const uniqueTrackIds = new Set(allAlerts.map(a => a.track_id));
            document.getElementById('unique-detections').textContent = uniqueTrackIds.size;
        }

        function applyFilters() {
            let filtered = [...allAlerts];
            
            // Apply confidence filter
            const filterLevel = document.getElementById('filter-select').value;
            if (filterLevel === 'high') {
                filtered = filtered.filter(a => a.confidence >= 0.9);
            } else if (filterLevel === 'medium') {
                filtered = filtered.filter(a => a.confidence >= 0.7 && a.confidence < 0.9);
            }

            // Apply sorting
            const sortBy = document.getElementById('sort-select').value;
            if (sortBy === 'newest') {
                filtered.sort((a, b) => b.frame_number - a.frame_number);
            } else if (sortBy === 'oldest') {
                filtered.sort((a, b) => a.frame_number - b.frame_number);
            } else if (sortBy === 'confidence') {
                filtered.sort((a, b) => b.confidence - a.confidence);
            }

            currentLightboxAlerts = filtered;
            displayAlerts(filtered);
        }

        function displayAlerts(alerts) {
            const container = document.getElementById('alerts-container');

            if (!alerts || alerts.length === 0) {
                container.innerHTML = `
                    <div class="no-alerts" style="grid-column: 1 / -1;">
                        <div class="no-alerts-icon">📭</div>
                        <div class="no-alerts-text">No Alerts Found</div>
                        <div class="no-alerts-subtext">No weapon detection alerts match your filters</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = alerts.map((alert, index) => `
                <div class="alert-card">
                    <div class="alert-thumbnail ${!alert.snapshot_path ? 'no-image' : ''}" onclick="${alert.snapshot_path ? `openLightbox(${index})` : 'null'}">
                        ${alert.snapshot_path ? 
                            `<img src="${alert.snapshot_path}" alt="Alert snapshot" onerror="this.parentElement.classList.add('no-image'); this.style.display='none';">
                             <div class="preview-indicator">👁️ Click to Preview</div>` 
                            : 'No Snapshot'}
                        <div class="alert-badge">🚨 ALERT</div>
                    </div>
                    <div class="alert-content">
                        <div class="alert-header">
                            <div class="alert-title">Weapon Detected</div>
                        </div>
                        <div class="alert-details">
                            <div class="detail-row">
                                <span class="detail-label">Confidence:</span>
                                <span class="detail-value">${(alert.confidence * 100).toFixed(1)}%</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Track ID:</span>
                                <span class="detail-value">#${alert.track_id || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Frame:</span>
                                <span class="detail-value">${alert.frame_number || 'N/A'}</span>
                            </div>
                        </div>
                        <div class="alert-actions">
                            <button class="btn-small" onclick="downloadSnapshot('${alert.snapshot_path}', ${alert.track_id})">Download</button>
                            <button class="btn-small" onclick="viewDetails(${index})">Details</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openLightbox(index) {
            if (currentLightboxAlerts.length === 0) return;
            
            currentImageIndex = index;
            const alert = currentLightboxAlerts[index];
            
            if (!alert.snapshot_path) return;
            
            // Update lightbox content
            document.getElementById('lightbox-image').src = alert.snapshot_path;
            document.getElementById('lightbox-confidence').textContent = (alert.confidence * 100).toFixed(1) + '%';
            document.getElementById('lightbox-track-id').textContent = '#' + (alert.track_id || 'N/A');
            document.getElementById('lightbox-frame').textContent = alert.frame_number || 'N/A';
            document.getElementById('lightbox-counter').textContent = (index + 1) + '/' + currentLightboxAlerts.length;
            
            // Update navigation buttons
            document.getElementById('prev-btn').disabled = index === 0;
            document.getElementById('next-btn').disabled = index === currentLightboxAlerts.length - 1;
            
            // Show modal
            document.getElementById('lightbox-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
            currentImageIndex = 0;
        }

        function prevImage() {
            if (currentImageIndex > 0) {
                openLightbox(currentImageIndex - 1);
            }
        }

        function nextImage() {
            if (currentImageIndex < currentLightboxAlerts.length - 1) {
                openLightbox(currentImageIndex + 1);
            }
        }

        function viewDetails(index) {
            const alert = allAlerts[index];
            const message = `
Track ID: ${alert.track_id}
Frame: ${alert.frame_number}
Confidence: ${(alert.confidence * 100).toFixed(1)}%
Snapshot: ${alert.snapshot_path || 'N/A'}`;
            alert(message);
        }

        function downloadSnapshot(path, trackId) {
            if (!path) {
                alert('No snapshot available for this alert');
                return;
            }
            // Create a link to download the snapshot
            const link = document.createElement('a');
            link.href = path;
            link.download = `alert_track_${trackId}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function clearAllAlerts() {
            if (confirm('Are you sure you want to clear all alerts? This action cannot be undone.')) {
                try {
                    const response = await fetch(`${API_BASE}/clear-alerts`, { method: 'POST' });
                    if (response.ok) {
                        allAlerts = [];
                        updateStats();
                        displayAlerts([]);
                        alert('All alerts cleared successfully');
                    }
                } catch (error) {
                    console.error("Error clearing alerts:", error);
                    alert('Failed to clear alerts');
                }
            }
        }

        function showError(message) {
            const container = document.getElementById('alerts-container');
            container.innerHTML = `
                <div class="no-alerts" style="grid-column: 1 / -1;">
                    <div class="no-alerts-icon">⚠️</div>
                    <div class="no-alerts-text">Error</div>
                    <div class="no-alerts-subtext">${message}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
