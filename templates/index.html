<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weapon Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .video-container {
            margin-bottom: 20px;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        #video-stream {
            width: 100%;
            max-width: 800px;
            height: auto;
            display: block;
        }

        .source-selector {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .source-selector label {
            color: #fff;
            font-weight: bold;
        }

        .source-selector select,
        .source-selector input {
            padding: 10px 15px;
            font-size: 14px;
            border: 1px solid #444;
            border-radius: 5px;
            background: #2a2a2a;
            color: #fff;
        }

        .source-selector input {
            width: 200px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #start-btn {
            background: #10b981;
            color: white;
        }

        #start-btn:hover:not(:disabled) {
            background: #059669;
        }

        #start-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        #stop-btn {
            background: #ef4444;
            color: white;
        }

        #stop-btn:hover:not(:disabled) {
            background: #dc2626;
        }

        #stop-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #fff; margin-bottom: 20px;">Weapon Detection System</h1>
        
        <div class="source-selector">
            <label for="source-type">Source Type:</label>
            <select id="source-type" onchange="updateSourceInput()">
                <option value="camera">Camera</option>
                <option value="file">Video File</option>
                <option value="rtsp">IP Camera (RTSP)</option>
                <option value="custom">Custom</option>
            </select>
            
            <label for="source-input" id="source-label">Camera Index:</label>
            <input type="text" id="source-input" value="0" placeholder="0, 1, 2 or file path">
        </div>
        
        <div class="video-container">
            <img id="video-stream" src="" alt="Live Feed" style="max-width: 100%; border: none;">
        </div>
        <div class="controls">
            <button id="start-btn" onclick="start()">Start</button>
            <button id="stop-btn" onclick="stop()" disabled>Stop</button>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:5000/api";
        let streamActive = false;

        function updateSourceInput() {
            const sourceType = document.getElementById("source-type").value;
            const sourceLabel = document.getElementById("source-label");
            const sourceInput = document.getElementById("source-input");
            
            switch(sourceType) {
                case "camera":
                    sourceLabel.textContent = "Camera Index:";
                    sourceInput.placeholder = "0, 1, 2...";
                    sourceInput.value = "0";
                    break;
                case "file":
                    sourceLabel.textContent = "Video File Path:";
                    sourceInput.placeholder = "/path/to/video.mp4";
                    sourceInput.value = "";
                    break;
                case "rtsp":
                    sourceLabel.textContent = "RTSP URL:";
                    sourceInput.placeholder = "rtsp://camera_ip:port/stream";
                    sourceInput.value = "";
                    break;
                case "custom":
                    sourceLabel.textContent = "Source:";
                    sourceInput.placeholder = "Enter source";
                    sourceInput.value = "";
                    break;
            }
        }

        async function start() {
            try {
                const source = document.getElementById("source-input").value || "0";
                
                const response = await fetch(`${API_BASE}/start`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ source: source })
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("start-btn").disabled = true;
                    document.getElementById("stop-btn").disabled = false;
                    document.getElementById("source-type").disabled = true;
                    document.getElementById("source-input").disabled = true;
                    streamActive = true;
                    
                    // Start streaming
                    const stream = document.getElementById("video-stream");
                    stream.src = `${API_BASE}/video_feed?t=${Date.now()}`;
                } else {
                    const error = await response.json();
                    alert("Error: " + (error.error || response.statusText));
                }
            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        async function stop() {
            try {
                await fetch(`${API_BASE}/stop`, { method: "POST" });
                document.getElementById("start-btn").disabled = false;
                document.getElementById("stop-btn").disabled = true;
                document.getElementById("source-type").disabled = false;
                document.getElementById("source-input").disabled = false;
                streamActive = false;
                
                const stream = document.getElementById("video-stream");
                stream.src = "";
            } catch (error) {
                alert("Error: " + error.message);
            }
        }
    </script>
</body>
</html>
